packages:
  - "packages/*"
# Single source of truth for shared dev-tool versions. Packages reference these
# with the `catalog:` protocol so every workspace resolves the same version and
# a bump happens in one place. Keeps transitively-vulnerable phantoms (e.g. an
# unanchored vitest peer pulling an old vite) from creeping back into the lock.
catalog:
  vitest: ^4.1.9
  vite: ^6.4.3
  typescript: 6.0.3
  '@types/node': ^20.0.0
# Force-resolve transitively-vulnerable phantoms. Unlike the catalog above, these
# packages aren't referenced by any workspace manifest (the `catalog:` protocol
# only reaches direct deps), so an override is the only lever that reaches them.
# All are dev/build-only tooling, so none carry runtime risk.
overrides:
  # serialize-javascript <7.0.5 is a dev-only transitive of mocha (vscode tests).
  # Even the latest mocha pins 6.0.2, which is vulnerable to GHSA-5c6j-r48x-rmvq
  # (RCE via RegExp.flags, high) and GHSA-hxcc-f52p-wc94 (CPU-exhaustion DoS).
  # Remove once mocha ships a patched pin — tracked in
  # https://github.com/jasonworden/mermaid-lint/issues/106
  serialize-javascript: ^7.0.5
  # js-yaml patched-version pins — Dependabot #10/#16/#17 (prototype pollution in
  # merge `<<`; quadratic-complexity DoS in merge-key handling). Removal tracked
  # alongside serialize-javascript in #106.
  #   @3 ← jest → babel-plugin-istanbul → @istanbuljs/load-nyc-config; 3.15.0 fixes.
  #   @4 ← markdownlint-cli2 AND mocha (both pin 4.1.0); >=4.2.0 fixes it. The mocha
  #        side shares serialize-javascript's root cause.
  js-yaml@3: 3.15.0
  js-yaml@4: ^4.2.0
allowBuilds:
  '@biomejs/biome': true
  esbuild: true
  # vsce's optional native deps — not needed for `vsce package` (used only by
  # `vsce publish` for credential storage/signing); skip their build scripts.
  '@vscode/vsce-sign': false
  keytar: false
